<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pollinations Chatbot</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #1a2242;
      --text: #eef2ff;
      --muted: #a7b0d6;
      --accent: #7c9cff;
      --accent-2: #4de2c5;
      --border: #2a3566;
      --user: #6f8cff;
      --assistant: #0d1430;
      --terminal-bg: #05070f;
      --terminal-green: #7CFF9E;
      --terminal-dim: #6f7aa8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1f, #111831);
      color: var(--text);
      min-height: 100vh;
    }

    /* Boot screen */
    .boot {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #0d1225, #05070f 45%);
      display: grid;
      place-items: center;
      z-index: 9999;
      transition: opacity 500ms ease, visibility 500ms ease;
    }

    .boot.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .terminal {
      width: min(860px, 92vw);
      height: min(520px, 82vh);
      border: 1px solid #1e294d;
      border-radius: 14px;
      background: linear-gradient(180deg, #070b17, #05070f);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .terminal-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #1a2447;
      background: #0a1022;
      color: #aab4df;
      font-size: 12px;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .terminal-body {
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.5;
      color: var(--terminal-green);
      overflow: auto;
      flex: 1;
      white-space: pre-wrap;
    }

    .line.dim { color: var(--terminal-dim); }
    .line.ok { color: #8dffad; }
    .line.warn { color: #ffd38a; }

    .progress-wrap {
      margin-top: 10px;
      border: 1px solid #23315f;
      border-radius: 10px;
      padding: 10px;
      background: rgba(12, 18, 36, 0.7);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      color: #a8b3e0;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .bar {
      height: 10px;
      background: #0d1430;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #273567;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5eead4, #7c9cff);
      transition: width 120ms linear;
    }

    /* App */
    .app-shell {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 400ms ease, transform 400ms ease;
    }

    .app-shell.ready {
      opacity: 1;
      transform: translateY(0);
    }

    header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(11, 16, 32, 0.92);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    h1 { margin: 0; font-size: 20px; }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .app {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: flex;
      min-height: calc(100vh - 76px);
    }

    .panel {
      width: 100%;
      background: rgba(18, 25, 51, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 120px);
      overflow: hidden;
    }

    .toolbar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      background: rgba(13, 20, 48, 0.7);
    }

    .toolbar-title { font-size: 15px; font-weight: 700; }
    .toolbar-sub { font-size: 12px; color: var(--muted); }

    .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      color: #071022;
      background: linear-gradient(135deg, var(--accent-2), #7cf1df);
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 600;
    }

    .status {
      margin: 12px 16px 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(13, 20, 48, 0.8);
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: #ffd5dc;
      border-color: rgba(255, 107, 129, 0.4);
      background: rgba(255, 107, 129, 0.1);
    }

    .status.success {
      color: #d8fff6;
      border-color: rgba(77, 226, 197, 0.35);
      background: rgba(77, 226, 197, 0.1);
    }

    .messages {
      flex: 1;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--user), #5878ff);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: flex;
      gap: 10px;
      background: rgba(13, 20, 48, 0.7);
    }

    textarea {
      flex: 1;
      min-height: 56px;
      max-height: 180px;
      resize: vertical;
      padding: 12px 13px;
      background: #0d1430;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      font: inherit;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 156, 255, 0.15);
    }

    .hint {
      padding: 0 16px 12px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <!-- Boot Overlay -->
  <section id="boot" class="boot">
    <div class="terminal">
      <div class="terminal-top">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span style="margin-left:8px;">model-installer.sh</span>
      </div>
      <div id="terminalBody" class="terminal-body"></div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Installing model assets...</span>
          <span id="percentText">0%</span>
        </div>
        <div class="bar"><span id="barFill"></span></div>
      </div>
    </div>
  </section>

  <!-- Main App -->
  <div id="appShell" class="app-shell">
    <header>
      <h1>Pollinations Chatbot</h1>
      <div class="sub">A simple chatbot UI powered by the Pollinations text API.</div>
    </header>

    <main class="app">
      <section class="panel">
        <div class="toolbar">
          <div>
            <div class="toolbar-title">Chat</div>
            <div class="toolbar-sub">Send a message and get a reply from Pollinations.</div>
          </div>
          <div class="toolbar-actions">
            <button id="clearBtn" class="btn-secondary">Clear Chat</button>
          </div>
        </div>

        <div id="status" class="status">Ready.</div>

        <div id="messages" class="messages">
          <div class="message assistant">Hi! Ask me anything.</div>
        </div>

        <div class="composer">
          <textarea id="promptInput" placeholder="Type your message here..."></textarea>
          <button id="sendBtn">Send</button>
        </div>

        <div class="hint">
          Press <strong>Ctrl + Enter</strong> (or <strong>Cmd + Enter</strong>) to send.
        </div>
      </section>
    </main>
  </div>

  <script>
    const boot = document.getElementById("boot");
    const terminalBody = document.getElementById("terminalBody");
    const percentText = document.getElementById("percentText");
    const barFill = document.getElementById("barFill");
    const appShell = document.getElementById("appShell");

    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const promptInput = document.getElementById("promptInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");

    const API_ENDPOINT = "https://corsproxy.io/?https://text.pollinations.ai/openai";

    let chatHistory = [{ role: "assistant", content: "Hi! Ask me anything." }];

    function line(text, cls = "") {
      const div = document.createElement("div");
      div.className = `line ${cls}`.trim();
      div.textContent = text;
      terminalBody.appendChild(div);
      terminalBody.scrollTop = terminalBody.scrollHeight;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runBootSequence() {
      const steps = [
        "[init] booting runtime...",
        "[check] verifying environment",
        "[net] connecting to registry",
        "[fetch] downloading tokenizer.bin",
        "[fetch] downloading model.safetensors",
        "[verify] validating checksums",
        "[build] compiling inference graph",
        "[opt] applying quantization profile",
        "[cache] warming prompt cache",
        "[ready] model installation complete"
      ];

      let p = 0;
      line("$ ./model-installer.sh", "dim");
      await wait(400);

      for (let i = 0; i < steps.length; i++) {
        line(steps[i], i === steps.length - 1 ? "ok" : "");
        const target = Math.min(100, Math.round(((i + 1) / steps.length) * 100));

        while (p < target) {
          p += Math.ceil(Math.random() * 3);
          if (p > target) p = target;
          percentText.textContent = `${p}%`;
          barFill.style.width = `${p}%`;
          await wait(35 + Math.random() * 55);
        }

        await wait(120 + Math.random() * 180);
      }

      await wait(450);
      line("[launch] opening chat interface...", "warn");
      await wait(500);

      boot.classList.add("hidden");
      appShell.classList.add("ready");
      promptInput.focus();
    }

    function setStatus(message, type = "") {
      statusEl.className = `status ${type}`.trim();
      statusEl.textContent = message;
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function clearChat() {
      chatHistory = [{ role: "assistant", content: "Hi! Ask me anything." }];
      messagesEl.innerHTML = "";
      addMessage("assistant", "Hi! Ask me anything.");
      setStatus("Chat cleared.", "success");
    }

    async function sendMessage() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      addMessage("user", prompt);
      chatHistory.push({ role: "user", content: prompt });
      promptInput.value = "";
      sendBtn.disabled = true;
      setStatus("Waiting for Pollinations response...");

      try {
        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: chatHistory })
        });

        if (!response.ok) {
          let responseText = "";
          try { responseText = await response.text(); } catch (_) {}
          throw new Error(`Request failed with status ${response.status}${responseText ? `: ${responseText.slice(0, 200)}` : ""}`);
        }

        const data = await response.json();
        const reply = data?.choices?.[0]?.message?.content || "No response content was returned.";

        addMessage("assistant", reply);
        chatHistory.push({ role: "assistant", content: reply });
        setStatus("Response received.", "success");
      } catch (error) {
        console.error(error);
        addMessage("assistant", "Sorry, something went wrong while contacting Pollinations.");
        setStatus(error.message || "Request failed.", "error");
      } finally {
        sendBtn.disabled = false;
        promptInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    clearBtn.addEventListener("click", clearChat);

    promptInput.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    runBootSequence();
  </script>
</body>
</html>
